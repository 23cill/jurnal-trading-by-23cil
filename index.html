<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>📊 Trading Journal Pro</h1>

<div class="stats">
<div class="card">
<h3>Total Trade</h3>
<p id="totalTrades">0</p>
</div>

<div class="card">
<h3>Win Rate</h3>
<p id="winRate">0%</p>
</div>

<div class="card">
<h3>Total Profit</h3>
<p id="totalProfit">$0</p>
</div>

<div class="card">
<h3>Profit Hari Ini</h3>
<p id="todayProfit">$0</p>
</div>

<div class="card">
<h3>Profit Bulan Ini</h3>
<p id="monthProfit">$0</p>
</div>

    <div class="card">
<h3>Profit Factor</h3>
<p id="profitFactor">0</p>
    </div>
</div>

<form id="tradeForm">
<input type="date" id="date" required>
<input type="text" id="pair" placeholder="EURUSD" required>
<input type="number" id="profit" placeholder="Profit/Loss" required>
<button type="submit">Tambah Trade</button>
</form>

<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Pair</th>
<th>P/L</th>
<th>Hapus</th>
</tr>
</thead>
<tbody id="tradeTable"></tbody>
</table>

<div class="card">
    <h3>Modal Saat Ini</h3>
    <p id="currentBalance">$1000</p>
</div>

<canvas id="equityChart"></canvas>

    <h2 style="margin-top:30px;text-align:center;">
📊 Win vs Loss
</h2>

<canvas id="winLossChart"></canvas>

<button id="exportBtn">Export CSV</button>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</div>

<script src="script.js"></script>
</body>
</html>
